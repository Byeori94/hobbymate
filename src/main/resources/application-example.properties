spring.application.name=hobbymate

server.servlet.session.timeout=60m

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=6MB

app.upload.profile-dir=uploads/profile

logging.level.root=INFO
logging.level.com.chlqufl=DEBUG

#chlqufl DB
# Change this to your own database information.
spring.datasource.url=jdbc:mariadb://localhost:3306/byeorispace
spring.datasource.username=YOUR_USERNAME
spring.datasource.password=YOUR_PASSWORD
spring.datasource.driver-class-name: org.mariadb.jdbc.Driver

mybatis.configuration.map-underscore-to-camel-case=true

mybatis.mapper-locations=classpath:mappers/**/*.xml
