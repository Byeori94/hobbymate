<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>비밀번호 변경 | HobbyMate</title>
    <link rel="stylesheet" th:href="@{/css/common/header.css}">
    <link rel="stylesheet" th:href="@{/css/pages/mypage-password.css}">
    <script defer th:src="@{/js/common/header.js}"></script>
    <script defer th:src="@{/js/pages/mypage-password.js}"></script>
</head>
<body>
<header th:replace="~{fragments/header :: header}"></header>
<main class="password-page">
    <section class="password-container" aria-labelledby="password-title">
        <div class="password-heading">
            <h1 id="password-title">비밀번호 변경</h1>
            <p>현재 비밀번호를 확인한 후 새 비밀번호를 입력해 주세요.</p>
        </div>

        <div class="password-card">
            <form id="password-change-form"
                  class="password-form"
                  th:action="@{/member/mypage/password}"
                  th:object="${passwordForm}"
                  method="post"
                  novalidate>
                <div class="form-alert" th:if="${#fields.hasGlobalErrors()}" role="alert">
                    <p th:each="error : ${#fields.globalErrors()}" th:text="${error}">
                        비밀번호를 변경할 수 없습니다.
                    </p>
                </div>

                <div class="form-field">
                    <label for="currentPassword">현재 비밀번호 <span aria-label="필수">*</span></label>
                    <div class="password-input-wrap">
                        <input id="currentPassword"
                               name="currentPassword"
                               type="password"
                               maxlength="255"
                               autocomplete="current-password"
                               required
                               th:attr="aria-invalid=${#fields.hasErrors('currentPassword')}"
                               aria-describedby="currentPassword-error">
                        <button class="password-toggle" type="button"
                                data-target="currentPassword" aria-label="현재 비밀번호 표시"
                                aria-pressed="false">표시</button>
                    </div>
                    <p id="currentPassword-error" class="field-error"
                       th:if="${#fields.hasErrors('currentPassword')}"
                       th:errors="*{currentPassword}">현재 비밀번호 오류</p>
                </div>

                <div class="form-field">
                    <label for="newPassword">새 비밀번호 <span aria-label="필수">*</span></label>
                    <div class="password-input-wrap">
                        <input id="newPassword"
                               name="newPassword"
                               type="password"
                               minlength="8"
                               maxlength="255"
                               autocomplete="new-password"
                               required
                               th:attr="aria-invalid=${#fields.hasErrors('newPassword')}"
                               aria-describedby="newPassword-help newPassword-error">
                        <button class="password-toggle" type="button"
                                data-target="newPassword" aria-label="새 비밀번호 표시"
                                aria-pressed="false">표시</button>
                    </div>
                    <p id="newPassword-help" class="field-help">
                        8~255자, 공백 없이 영문·숫자·특수문자 중 2종 이상을 사용해 주세요.
                    </p>
                    <p id="newPassword-error" class="field-error"
                       th:if="${#fields.hasErrors('newPassword')}"
                       th:errors="*{newPassword}">새 비밀번호 오류</p>
                </div>

                <div class="form-field">
                    <label for="newPasswordConfirm">새 비밀번호 확인 <span aria-label="필수">*</span></label>
                    <div class="password-input-wrap">
                        <input id="newPasswordConfirm"
                               name="newPasswordConfirm"
                               type="password"
                               maxlength="255"
                               autocomplete="new-password"
                               required
                               th:attr="aria-invalid=${#fields.hasErrors('newPasswordConfirm')}"
                               aria-describedby="password-match-status newPasswordConfirm-error">
                        <button class="password-toggle" type="button"
                                data-target="newPasswordConfirm" aria-label="새 비밀번호 확인 표시"
                                aria-pressed="false">표시</button>
                    </div>
                    <p id="password-match-status" class="field-status" aria-live="polite"></p>
                    <p id="newPasswordConfirm-error" class="field-error"
                       th:if="${#fields.hasErrors('newPasswordConfirm')}"
                       th:errors="*{newPasswordConfirm}">새 비밀번호 확인 오류</p>
                </div>

                <p id="submit-status" class="submit-status" aria-live="assertive"></p>
                <div class="form-actions">
                    <a class="cancel-button" th:href="@{/member/mypage}">취소</a>
                    <button id="change-button" class="change-button" type="submit">비밀번호 변경</button>
                </div>
            </form>
        </div>
    </section>
</main>
</body>
</html>
