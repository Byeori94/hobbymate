<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>HobbyMate</title>
    <link rel="stylesheet" th:href="@{/css/common/header.css}">
    <link rel="stylesheet" th:href="@{/css/pages/home.css}">
    <script defer th:src="@{/js/common/header.js}"></script>
</head>
<body>
<header th:replace="~{fragments/header :: header}"></header>
<main class="hero">
    <div class="home-message" th:if="${successMessage}" role="status" th:text="${successMessage}">
        회원 탈퇴가 완료되었습니다.
    </div>
    <h1>취미로 이어지는 우리, HobbyMate</h1>
    <p>관심사가 같은 사람들과 모임을 만들고 새로운 경험을 시작해 보세요.</p>
</main>
</body>
</html>
