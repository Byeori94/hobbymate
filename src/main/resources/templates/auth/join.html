<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>회원가입 | HobbyMate</title>
    <link rel="stylesheet" th:href="@{/css/pages/join.css}">
    <script defer th:src="@{/js/pages/join.js}"></script>
</head>
<body>
<main class="join-page">
    <section class="join-card" aria-labelledby="join-title">
        <a class="brand-link" th:href="@{/auth/join}" aria-label="HobbyMate 회원가입">
            <img class="brand-logo" th:src="@{/images/logo/hobbymate_logo_transparent.png}" alt="HobbyMate">
        </a>
        <div class="join-heading">
            <h1 id="join-title">회원가입</h1>
            <p>같은 취미를 함께할 새로운 인연을 만나보세요.</p>
        </div>
        <div class="identity-notice" role="note">
            <strong>개발 버전 안내</strong>
            <span>현재 개발 버전에서는 본인인증 정보가 직접 입력 방식으로 처리됩니다. 입력만으로 본인인증이 완료되지는 않습니다.</span>
        </div>
        <form id="join-form"
              class="join-form"
              th:action="@{/auth/join}"
              th:object="${joinRequest}"
              th:data-check-id-url="@{/auth/check-id}"
              th:data-check-nickname-url="@{/auth/check-nickname}"
              th:data-check-email-url="@{/auth/check-email}"
              method="post"
              novalidate>
            <div class="form-alert" th:if="${#fields.hasGlobalErrors()}" role="alert">
                <p th:each="error : ${#fields.globalErrors()}" th:text="${error}">입력 정보를 다시 확인해 주세요.</p>
            </div>
            <fieldset>
                <legend>계정 정보</legend>
                <div class="form-field">
                    <label for="loginId">아이디 <span class="required" aria-label="필수">*</span></label>
                    <div class="field-action">
                        <input id="loginId" type="text" th:field="*{loginId}" minlength="5" maxlength="20" autocomplete="username" aria-describedby="loginId-help loginId-status loginId-error" required>
                        <button type="button" class="check-button" data-check="loginId">중복 확인</button>
                    </div>
                    <p id="loginId-help" class="field-help">5~20자의 영문 소문자와 숫자를 사용해 주세요. 영문 소문자로 시작해야 합니다.</p>
                    <p id="loginId-status" class="field-status" aria-live="polite"></p>
                    <p id="loginId-error" class="field-error" th:if="${#fields.hasErrors('loginId')}" th:errors="*{loginId}"></p>
                </div>
                <div class="form-field">
                    <label for="password">비밀번호 <span class="required" aria-label="필수">*</span></label>
                    <input id="password" type="password" th:field="*{password}" minlength="8" maxlength="255" autocomplete="new-password" aria-describedby="password-help password-error" required>
                    <p id="password-help" class="field-help">8자 이상이며 영문, 숫자, 특수문자 중 2종 이상을 사용해 주세요.</p>
                    <p id="password-error" class="field-error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></p>
                </div>
                <div class="form-field">
                    <label for="passwordConfirm">비밀번호 확인 <span class="required" aria-label="필수">*</span></label>
                    <input id="passwordConfirm" type="password" th:field="*{passwordConfirm}" maxlength="255" autocomplete="new-password" aria-describedby="passwordConfirm-status passwordConfirm-error" required>
                    <p id="passwordConfirm-status" class="field-status" aria-live="polite"></p>
                    <p id="passwordConfirm-error" class="field-error" th:if="${#fields.hasErrors('passwordConfirm')}" th:errors="*{passwordConfirm}"></p>
                </div>
                <div class="form-field">
                    <label for="nickname">닉네임 <span class="required" aria-label="필수">*</span></label>
                    <div class="field-action">
                        <input id="nickname" type="text" th:field="*{nickname}" maxlength="50" autocomplete="nickname" aria-describedby="nickname-status nickname-error" required>
                        <button type="button" class="check-button" data-check="nickname">중복 확인</button>
                    </div>
                    <p id="nickname-status" class="field-status" aria-live="polite"></p>
                    <p id="nickname-error" class="field-error" th:if="${#fields.hasErrors('nickname')}" th:errors="*{nickname}"></p>
                </div>
                <div class="form-field">
                    <label for="email">이메일 <span class="required" aria-label="필수">*</span></label>
                    <div class="field-action">
                        <input id="email" type="email" th:field="*{email}" maxlength="255" autocomplete="email" aria-describedby="email-status email-error" required>
                        <button type="button" class="check-button" data-check="email">중복 확인</button>
                    </div>
                    <p id="email-status" class="field-status" aria-live="polite"></p>
                    <p id="email-error" class="field-error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></p>
                </div>
            </fieldset>
            <fieldset>
                <legend>본인 정보</legend>
                <div class="form-field">
                    <label for="name">이름 <span class="required" aria-label="필수">*</span></label>
                    <input id="name" type="text" th:field="*{name}" maxlength="50" autocomplete="name" aria-describedby="name-error" required>
                    <p id="name-error" class="field-error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></p>
                </div>
                <div class="form-field">
                    <label for="phone">휴대폰 번호 <span class="required" aria-label="필수">*</span></label>
                    <input id="phone" type="tel" th:field="*{phone}" maxlength="13" inputmode="numeric" autocomplete="tel" placeholder="010-1234-5678" aria-describedby="phone-error" required>
                    <p id="phone-error" class="field-error" th:if="${#fields.hasErrors('phone')}" th:errors="*{phone}"></p>
                </div>
                <div class="form-grid">
                    <div class="form-field">
                        <label for="birthDate">생년월일 <span class="required" aria-label="필수">*</span></label>
                        <input id="birthDate" type="date" th:field="*{birthDate}" th:max="${today}" autocomplete="bday" aria-describedby="birthDate-error" required>
                        <p id="birthDate-error" class="field-error" th:if="${#fields.hasErrors('birthDate')}" th:errors="*{birthDate}"></p>
                    </div>
                    <div class="form-field">
                        <span class="field-label">성별 <span class="required" aria-label="필수">*</span></span>
                        <div class="radio-group" role="radiogroup" aria-describedby="gender-error">
                            <label><input type="radio" th:field="*{gender}" value="FEMALE"> 여성</label>
                            <label><input type="radio" th:field="*{gender}" value="MALE"> 남성</label>
                        </div>
                        <p id="gender-error" class="field-error" th:if="${#fields.hasErrors('gender')}" th:errors="*{gender}"></p>
                    </div>
                </div>
            </fieldset>
            <fieldset class="agreement-box">
                <legend>약관 동의</legend>
                <label class="agreement-all"><input id="agreeAll" type="checkbox"> 필수 항목 전체 동의</label>
                <div class="agreement-list">
                    <label><input class="required-agreement" type="checkbox" th:field="*{termsAgreed}"> <span>[필수] 이용약관 동의</span></label>
                    <p class="field-error" th:if="${#fields.hasErrors('termsAgreed')}" th:errors="*{termsAgreed}"></p>
                    <label><input class="required-agreement" type="checkbox" th:field="*{privacyAgreed}"> <span>[필수] 개인정보 수집 및 이용 동의</span></label>
                    <p class="field-error" th:if="${#fields.hasErrors('privacyAgreed')}" th:errors="*{privacyAgreed}"></p>
                </div>
            </fieldset>
            <p id="submit-status" class="submit-status" aria-live="assertive"></p>
            <button class="submit-button" type="submit">회원가입</button>
        </form>
        <p class="login-link">이미 계정이 있으신가요? <a th:href="@{/login}">로그인</a></p>
    </section>
</main>
</body>
</html>
