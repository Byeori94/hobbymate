<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>로그인 | HobbyMate</title>
    <link rel="stylesheet" th:href="@{/css/pages/login.css}">
    <script defer th:src="@{/js/pages/login.js}"></script>
</head>
<body>
<main class="login-page">
    <section class="login-card" aria-labelledby="login-title">
        <a class="brand-link" th:href="@{/}" aria-label="HobbyMate 메인으로 이동">
            <img class="brand-logo" th:src="@{/images/logo/hobbymate_logo_transparent.png}" alt="HobbyMate">
        </a>
        <div class="login-heading">
            <h1 id="login-title">로그인</h1>
            <p>같은 취미를 함께할 새로운 인연을 만나보세요.</p>
        </div>

        <div class="form-message is-error" th:if="${loginError}" role="alert">
            아이디 또는 비밀번호가 올바르지 않습니다.
        </div>
        <div class="form-message is-success" th:if="${joinSuccess}" role="status">
            회원가입이 완료되었습니다. 로그인해 주세요.
        </div>
        <div class="form-message is-success" th:if="${logoutSuccess}" role="status">
            로그아웃되었습니다.
        </div>

        <form id="login-form" class="login-form" th:action="@{/auth/login}" method="post" novalidate>
            <div class="form-field">
                <label for="loginId">아이디</label>
                <input id="loginId"
                       name="loginId"
                       type="text"
                       th:value="${savedLoginId}"
                       minlength="5"
                       maxlength="20"
                       pattern="[a-z][a-z0-9]{4,19}"
                       autocomplete="username"
                       aria-describedby="loginId-help loginId-error"
                       required>
                <p id="loginId-help" class="field-help">영문 소문자와 숫자만 입력 가능합니다.</p>
                <p id="loginId-error" class="field-error" aria-live="polite"></p>
            </div>

            <div class="form-field">
                <label for="password">비밀번호</label>
                <div class="password-field">
                    <input id="password"
                           name="password"
                           type="password"
                           maxlength="255"
                           autocomplete="current-password"
                           aria-describedby="password-error"
                           required>
                    <button id="password-toggle"
                            class="password-toggle"
                            type="button"
                            aria-label="비밀번호 표시">표시</button>
                </div>
                <p id="password-error" class="field-error" aria-live="polite"></p>
            </div>

            <label class="save-id-option">
                <input type="checkbox" name="saveId" value="true" th:checked="${savedIdPresent}">
                아이디 저장
            </label>

            <p id="submit-error" class="submit-error" aria-live="assertive"></p>
            <button id="login-button" class="login-button" type="submit">로그인</button>
        </form>

        <p class="join-link">아직 회원이 아니신가요? <a th:href="@{/auth/join}">회원가입</a></p>
    </section>
</main>
</body>
</html>
